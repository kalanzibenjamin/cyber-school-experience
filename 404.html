<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Cyber School Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/responsive.css" />

    <style>
        /* ===== 404 PAGE SPECIFIC STYLES ===== */
        .error-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: var(--light-bg);
        }

        .error-content {
            max-width: 600px;
            text-align: center;
            background: var(--white);
            border-radius: var(--radius);
            padding: 60px 48px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .error-content::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(37, 211, 102, 0.04);
            border-radius: 50%;
            pointer-events: none;
        }

        .error-content .error-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 3rem;
            color: var(--white);
            position: relative;
            z-index: 1;
        }

        .error-content .error-code {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        .error-content h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--navy);
            margin: 12px 0 8px;
            position: relative;
            z-index: 1;
        }

        .error-content p {
            color: var(--gray);
            font-size: 1.05rem;
            max-width: 400px;
            margin: 0 auto 28px;
            position: relative;
            z-index: 1;
        }

        .error-content .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .error-content .error-actions .btn {
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-primary);
        }

        .error-content .error-actions .btn-primary {
            background: linear-gradient(135deg, var(--navy), var(--blue));
            color: var(--white);
            box-shadow: 0 4px 20px rgba(10, 36, 99, 0.3);
        }

        .error-content .error-actions .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(10, 36, 99, 0.4);
        }

        .error-content .error-actions .btn-secondary {
            background: var(--light-bg);
            color: var(--navy);
            border: 2px solid var(--gray-light);
        }

        .error-content .error-actions .btn-secondary:hover {
            background: var(--navy);
            color: var(--white);
            border-color: var(--navy);
            transform: translateY(-3px);
        }

        .error-content .error-actions .btn-whatsapp {
            background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
            color: var(--white);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }

        .error-content .error-actions .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(37, 211, 102, 0.4);
        }

        .error-content .error-help {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-light);
            position: relative;
            z-index: 1;
        }

        .error-content .error-help p {
            font-size: 0.85rem;
            color: var(--gray);
            margin: 0;
        }

        .error-content .error-help a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
        }

        .error-content .error-help a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .error-content {
                padding: 40px 24px;
            }

            .error-content .error-code {
                font-size: 4rem;
            }

            .error-content h1 {
                font-size: 1.4rem;
            }

            .error-content p {
                font-size: 0.95rem;
            }

            .error-content .error-actions {
                flex-direction: column;
                align-items: center;
            }

            .error-content .error-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .error-content {
                padding: 32px 16px;
            }

            .error-content .error-icon {
                width: 72px;
                height: 72px;
                font-size: 2.2rem;
            }

            .error-content .error-code {
                font-size: 3rem;
            }

            .error-content h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BANNER ===== -->
    <div class="top-banner">
        <i class="fas fa-bullhorn"></i>
        Welcome to Cyber School Experience Community —
        <a href="/pages/chats/">Join your class WhatsApp group</a>
        <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
    </div>

    <!-- ===== HEADER ===== -->
    <!--#include file="components/header.html" -->

    <!-- ===== ERROR PAGE ===== -->
    <section class="error-page">
        <div class="error-content">
            <div class="error-icon">
                <i class="fas fa-compass"></i>
            </div>
            <div class="error-code">404</div>
            <h1>Oops! Page Not Found</h1>
            <p>
                The page you're looking for seems to have wandered off.
                Don't worry, we'll help you find your way back.
            </p>
            <div class="error-actions">
                <a href="/index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="/pages/chats/" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> Find Your Group
                </a>
                <a href="/pages/announcements/" class="btn btn-secondary">
                    <i class="fas fa-bullhorn"></i> Announcements
                </a>
            </div>
            <div class="error-help">
                <p>
                    <i class="fas fa-envelope" style="color:var(--blue); margin-right:6px;"></i>
                    Need help? <a href="/pages/contact/">Contact us</a>
                    &nbsp;•&nbsp;
                    <i class="fas fa-arrow-left" style="color:var(--blue); margin-right:6px;"></i>
                    <a href="javascript:history.back()">Go back</a>
                </p>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <!--#include file="components/footer.html" -->

    <!-- ===== SCRIPTS ===== -->
    <script src="/assets/js/main.js"></script>
    <script src="/assets/js/navigation.js"></script>

</body>
</html>
