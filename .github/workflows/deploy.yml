name: Deploy to Shared Hosting

on:
  push:
    branches:
      - main # Trigger the workflow when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step to set up your specific environment (e.g., PHP for Laravel)
      # ...

      - name: Deploy Application
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -az # Archive mode and compression
          path: ./ # The directory to deploy
          remote_path: ${{ secrets.APP_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}
