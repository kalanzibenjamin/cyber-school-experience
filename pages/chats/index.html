<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chats - Cyber School Experience</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="../../assets/css/main.css" />
    
    <style>
        /* ============================================================
           CHATS PAGE STYLES
           ============================================================ */
        
        /* ----- PAGE HEADER ----- */
        .page-header {
            padding: 40px 40px 20px;
            position: relative;
            z-index: 5;
        }

        .page-header-content {
            max-width: 1300px;
            margin: 0 auto;
        }

        .page-header-content h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .page-header-content h1 i {
            color: var(--whatsapp);
            font-size: 2rem;
        }

        .page-header-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin-top: 8px;
        }

        /* ----- STATS BAR ----- */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            padding: 8px 0 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .stats-bar .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-bar .stat-item i {
            font-size: 1.5rem;
            color: var(--whatsapp);
            opacity: 0.6;
        }

        .stats-bar .stat-item .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .stats-bar .stat-item .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* ----- FILTER / SEARCH ----- */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            padding: 0 0 24px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 10px 20px;
            transition: all var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.15);
        }

        .search-box i {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-light);
        }

        .filter-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btns button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            background: var(--surface-glass);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }

        .filter-btns button:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .filter-btns button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px -4px rgba(42, 125, 225, 0.30);
        }

        .filter-btns button i {
            font-size: 0.8rem;
        }

        /* ----- GROUPS GRID ----- */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 12px 0 24px;
        }

        .group-card {
            background: var(--surface-glass);
            border-radius: var(--radius);
            border: 1px solid var(--border-glass);
            padding: 28px 24px;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .group-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--whatsapp);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .group-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            background: var(--surface-glass-hover);
        }

        .group-card:hover::before {
            opacity: 1;
        }

        .group-card .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .group-card .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--whatsapp);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            box-shadow: 0 4px 12px -4px rgba(37, 211, 102, 0.30);
        }

        .group-card .card-badges {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .group-card .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 12px;
            border-radius: 40px;
            background: var(--tag-bg);
            color: var(--accent);
            margin: 0;
        }

        .group-card .badge.featured-badge {
            background: #f59e0b;
            color: #fff;
        }

        .group-card .badge.active-badge {
            background: #10b981;
            color: #fff;
        }

        .group-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .group-card .class-code {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-light);
            background: var(--surface);
            padding: 2px 12px;
            border-radius: 40px;
            margin-bottom: 8px;
        }

        .group-card .description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .group-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .group-card .members {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .group-card .members i {
            color: var(--whatsapp);
        }

        .group-card .btn-join {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #fff;
            background: var(--whatsapp);
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            box-shadow: 0 4px 12px -4px rgba(37, 211, 102, 0.30);
        }

        .group-card .btn-join:hover {
            background: var(--whatsapp-hover);
            transform: scale(1.04);
            box-shadow: 0 6px 20px -6px rgba(37, 211, 102, 0.40);
        }

        .group-card .btn-join i {
            color: #fff;
        }

        /* ----- EMPTY STATE ----- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            opacity: 0.3;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .page-header {
                padding: 30px 24px 16px;
            }

            .page-header-content h1 {
                font-size: 2.2rem;
            }

            .groups-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            .stats-bar {
                padding: 4px 0 16px;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 20px 16px 12px;
            }

            .page-header-content h1 {
                font-size: 1.8rem;
            }

            .page-header-content p {
                font-size: 0.95rem;
            }

            .filter-section {
                flex-direction: column;
                padding: 0 16px 16px;
            }

            .search-box {
                width: 100%;
            }

            .filter-btns {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }

            .filter-btns button {
                flex-shrink: 0;
                font-size: 0.8rem;
                padding: 6px 14px;
            }

            .groups-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 8px 0 16px;
            }

            .group-card {
                padding: 20px 16px;
            }

            .group-card .card-top {
                flex-wrap: wrap;
            }

            .group-card .card-badges {
                flex-direction: row;
                align-items: center;
            }

            .group-card h3 {
                font-size: 1rem;
            }

            .group-card .description {
                font-size: 0.85rem;
            }

            .stats-bar {
                gap: 16px;
                padding: 0 0 12px;
            }

            .stats-bar .stat-item .stat-number {
                font-size: 1.2rem;
            }

            .stats-bar .stat-item .stat-label {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .page-header-content h1 {
                font-size: 1.4rem;
            }

            .group-card {
                padding: 16px 14px;
            }

            .group-card .card-icon {
                width: 42px;
                height: 42px;
                font-size: 1.2rem;
            }

            .group-card .btn-join {
                padding: 6px 16px;
                font-size: 0.8rem;
            }

            .stats-bar .stat-item i {
                font-size: 1.2rem;
            }

            .stats-bar .stat-item .stat-number {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BANNER ===== -->
    <div class="top-banner">
        <i class="fas fa-bullhorn"></i>
        Welcome to Cyber School Experience Community —
        <a href="index.html">Join your class WhatsApp group</a>
        <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
    </div>

    <!-- ===== HEADER ===== -->
    <div data-include="../../components/header.html"></div>

    <!-- ===== PAGE HEADER ===== -->
    <section class="page-header">
        <div class="page-header-content">
            <span class="badge"><i class="fab fa-whatsapp"></i> Connect & Learn</span>
            <h1><i class="fab fa-whatsapp"></i> Find Your Class Chat</h1>
            <p>Join your class WhatsApp group to connect with peers, share resources, and stay updated with academic announcements</p>
            <p style="margin-top: 12px;">
                <a href="guidelines.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;text-decoration:none;">
                    <i class="fas fa-book-open"></i> Read chat guidelines
                </a>
            </p>
        </div>
    </section>

    <!-- ===== MAIN ===== -->
    <main>

        <!-- ===== STATS BAR ===== -->
        <div class="stats-bar" id="statsBar">
            <!-- Rendered by JS -->
        </div>

        <!-- ===== FILTER / SEARCH ===== -->
        <div class="filter-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by class code or title..." aria-label="Search groups" />
            </div>
            <div class="filter-btns">
                <button class="active" data-filter="all"><i class="fas fa-list"></i> All</button>
                <button data-filter="1.2"><i class="fas fa-layer-group"></i> 1.2</button>
                <button data-filter="2.1"><i class="fas fa-layer-group"></i> 2.1</button>
                <button data-filter="2.2"><i class="fas fa-layer-group"></i> 2.2</button>
                <button data-filter="3.1"><i class="fas fa-layer-group"></i> 3.1</button>
            </div>
        </div>

        <!-- ===== GROUPS GRID ===== -->
        <div class="groups-grid" id="groupsGrid">
            <!-- Cards will be rendered by JS -->
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <div data-include="../../components/footer.html"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="../../assets/js/include.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        (function() {
            'use strict';

            // ===== GROUPS DATA =====
            const GROUPS_DATA = null;

            // ===== GROUPS MANAGER =====
            class GroupsManager {
                constructor(data) {
                    this.allItems = Array.isArray(data) ? data : (data?.groups || data?.items || []);
                    this.filteredItems = [...this.allItems];
                    this.currentFilter = 'all';
                    this.searchQuery = '';
                }

                getItems() {
                    return this.filteredItems;
                }

                getStats() {
                    const total = this.allItems.length;
                    const active = this.allItems.filter(g => g.active).length;
                    const featured = this.allItems.filter(g => g.featured).length;
                    const classCodes = [...new Set(this.allItems.map(g => g.classCode))];
                    return { total, active, featured, classCodes: classCodes.length };
                }

                filter(category, search = '') {
                    this.currentFilter = category;
                    this.searchQuery = search.toLowerCase().trim();

                    let items = [...this.allItems];

                    // Filter by class code
                    if (category !== 'all') {
                        items = items.filter(item => item.classCode === category);
                    }

                    // Filter by search
                    if (this.searchQuery) {
                        items = items.filter(item => 
                            item.title.toLowerCase().includes(this.searchQuery) ||
                            item.classCode.toLowerCase().includes(this.searchQuery) ||
                            item.description.toLowerCase().includes(this.searchQuery)
                        );
                    }

                    // Sort: Featured first, then by title
                    items.sort((a, b) => {
                        if (a.featured && !b.featured) return -1;
                        if (!a.featured && b.featured) return 1;
                        return a.title.localeCompare(b.title);
                    });

                    this.filteredItems = items;
                    return this.filteredItems;
                }
            }

            // ===== RENDERER =====
            class GroupsRenderer {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    this.manager = null;
                }

                setManager(manager) {
                    this.manager = manager;
                }

                render() {
                    if (!this.manager || !this.container) return;

                    const items = this.manager.getItems();

                    if (items.length === 0) {
                        this.container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-comments"></i>
                                <h3>No groups found</h3>
                                <p>Try adjusting your search or filter criteria</p>
                            </div>
                        `;
                        return;
                    }

                    this.container.innerHTML = items.map(item => {
                        const icon = item.icon || 'fa-users';

                        return `
                            <div class="group-card" data-id="${item.id}">
                                <div class="card-top">
                                    <div class="card-icon">
                                        <i class="fas ${icon}"></i>
                                    </div>
                                    <div class="card-badges">
                                        ${item.featured ? '<span class="badge featured-badge"><i class="fas fa-star"></i> Featured</span>' : ''}
                                        ${item.active ? '<span class="badge active-badge"><i class="fas fa-circle" style="font-size: 0.4rem;"></i> Active</span>' : ''}
                                    </div>
                                </div>
                                <h3>${item.title}</h3>
                                <span class="class-code"><i class="fas fa-tag"></i> ${item.classCode}</span>
                                <p class="description">${item.description}</p>
                                <div class="card-footer">
                                    <span class="members">
                                        <i class="fas fa-user-group"></i> ${item.members} members
                                    </span>
                                    <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="btn-join">
                                        <i class="fab fa-whatsapp"></i> Join Group
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }

            // ===== STATS RENDERER =====
            function renderStats(manager) {
                const container = document.getElementById('statsBar');
                if (!container) return;

                const stats = manager.getStats();

                container.innerHTML = `
                    <div class="stat-item">
                        <i class="fas fa-comments"></i>
                        <div>
                            <div class="stat-number">${stats.total}</div>
                            <div class="stat-label">Total Groups</div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-user-group"></i>
                        <div>
                            <div class="stat-number">${stats.active}</div>
                            <div class="stat-label">Active Groups</div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-star"></i>
                        <div>
                            <div class="stat-number">${stats.featured}</div>
                            <div class="stat-label">Featured</div>
                        </div>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-layer-group"></i>
                        <div>
                            <div class="stat-number">${stats.classCodes}</div>
                            <div class="stat-label">Class Levels</div>
                        </div>
                    </div>
                `;
            }

            // ===== TOAST NOTIFICATION =====
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 24px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 12px 24px;
                    border-radius: 12px;
                    background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                    color: #fff;
                    font-weight: 500;
                    font-size: 0.9rem;
                    box-shadow: 0 8px 24px rgba(0,0,0,0.20);
                    z-index: 9999;
                    opacity: 0;
                    transition: opacity 0.3s ease, transform 0.3s ease;
                    transform: translateX(-50%) translateY(20px);
                    font-family: 'Inter', sans-serif;
                    max-width: 90%;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                });

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(20px)';
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, 300);
                }, 3000);
            }

            // ===== INITIALIZE =====
            async function initChatsPage() {
                try {
                    const groups = await window.CSE_Groups.getInstance().load();
                    const manager = new GroupsManager(groups);
                    manager.filter('all');

                    // Render stats
                    renderStats(manager);

                    // Create renderer
                    const renderer = new GroupsRenderer('groupsGrid');
                    renderer.setManager(manager);
                    renderer.render();

                    // ===== SEARCH =====
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        let searchTimer;
                        searchInput.addEventListener('input', function() {
                            clearTimeout(searchTimer);
                            searchTimer = setTimeout(() => {
                                const query = this.value.trim();
                                manager.filter(manager.currentFilter, query);
                                renderer.render();
                            }, 300);
                        });
                    }

                    // ===== FILTERS =====
                    const filterBtns = document.querySelectorAll('.filter-btns button');
                    filterBtns.forEach(btn => {
                        btn.addEventListener('click', function() {
                            filterBtns.forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                            const filter = this.dataset.filter;
                            const search = searchInput ? searchInput.value.trim() : '';
                            manager.filter(filter, search);
                            renderer.render();
                        });
                    });

                    // ===== JOIN BUTTON TRACKING =====
                    document.addEventListener('click', function(e) {
                        const joinBtn = e.target.closest('.btn-join');
                        if (joinBtn) {
                            const groupCard = joinBtn.closest('.group-card');
                            if (groupCard) {
                                const title = groupCard.querySelector('h3')?.textContent || 'Class Group';
                                showToast(`🎯 Opening ${title} on WhatsApp...`, 'success');
                            }
                        }
                    });

                    console.log('💬 Chats page initialized with', manager.allItems.length, 'groups');
                } catch (error) {
                    console.error('Could not load groups data:', error);
                    const fallbackManager = new GroupsManager([]);
                    renderStats(fallbackManager);
                    const renderer = new GroupsRenderer('groupsGrid');
                    renderer.setManager(fallbackManager);
                    renderer.render();
                }
            }

            // ===== INIT =====
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initChatsPage);
            } else {
                initChatsPage();
            }

        })();
    </script>

</body>
</html>
