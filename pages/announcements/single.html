<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcement - Cyber School Experience</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="../../assets/css/main.css" />
    
    <style>
        /* ============================================================
           SINGLE ANNOUNCEMENT PAGE STYLES
           ============================================================ */
        
        /* ----- TOP BANNER ----- */
        .top-banner {
            background: var(--banner-bg);
            color: var(--banner-text);
            text-align: center;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.2px;
            border-bottom: 2px solid var(--whatsapp);
            position: relative;
            z-index: 20;
        }

        .top-banner a {
            color: var(--banner-link);
            font-weight: 600;
            margin: 0 4px;
            border-bottom: 1px dotted rgba(139, 184, 255, 0.4);
            transition: color var(--transition);
        }

        .top-banner a:hover {
            color: var(--text-inverse);
        }

        /* ----- PAGE SHELL ----- */
        .page-shell {
            max-width: 900px;
            margin: 40px auto 60px;
            padding: 0 20px;
            position: relative;
            z-index: 5;
        }

        /* ----- CONTENT CARD ----- */
        .content-card {
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 40px 44px;
            backdrop-filter: blur(12px) saturate(140%);
            -webkit-backdrop-filter: blur(12px) saturate(140%);
            box-shadow: var(--shadow);
            transition: background var(--transition), border-color var(--transition);
        }

        /* ----- BACK LINK ----- */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all var(--transition);
            padding: 8px 16px;
            border-radius: 40px;
            background: var(--accent-soft);
        }

        .back-link:hover {
            background: var(--accent);
            color: #fff;
            transform: translateX(-4px);
        }

        .back-link:hover i {
            transform: translateX(-4px);
        }

        .back-link i {
            transition: transform var(--transition);
        }

        /* ----- EYEBROW ----- */
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-soft);
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            border: 1px solid var(--badge-border);
            margin-bottom: 16px;
        }

        /* ----- TITLE ----- */
        .content-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        /* ----- META ----- */
        .announcement-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 0 0 20px;
            padding: 16px 0;
            border-top: 1px solid var(--border-glass);
            border-bottom: 1px solid var(--border-glass);
        }

        .announcement-meta .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .announcement-meta .meta-item i {
            color: var(--text-light);
            width: 16px;
        }

        .announcement-meta .meta-item .author-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .announcement-meta .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 2px 14px;
            border-radius: 40px;
            background: var(--tag-bg);
            color: var(--accent);
        }

        .announcement-meta .category-tag.urgent {
            background: rgba(225, 29, 72, 0.12);
            color: #e11d48;
        }

        .announcement-meta .category-tag.event {
            background: rgba(245, 158, 11, 0.12);
            color: #d97706;
        }

        .announcement-meta .category-tag.update {
            background: rgba(59, 130, 246, 0.12);
            color: #2563eb;
        }

        .announcement-meta .category-tag.important {
            background: rgba(139, 92, 246, 0.12);
            color: #7c3aed;
        }

        .announcement-meta .featured-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 2px 12px;
            border-radius: 40px;
            background: #f59e0b;
            color: #fff;
        }

        /* ----- BODY ----- */
        .announcement-body {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.8;
            padding: 8px 0 4px;
        }

        .announcement-body p {
            margin-bottom: 16px;
        }

        .announcement-body ul,
        .announcement-body ol {
            margin: 12px 0 16px 24px;
            padding: 0;
        }

        .announcement-body ul li,
        .announcement-body ol li {
            margin-bottom: 8px;
        }

        .announcement-body strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        .announcement-body a {
            color: var(--accent);
            text-decoration: underline;
        }

        .announcement-body a:hover {
            color: var(--accent-hover);
        }

        /* ----- ACTIONS ----- */
        .announcement-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border-glass);
        }

        .announcement-actions .btn-share {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 12px -4px rgba(42, 125, 225, 0.30);
            font-family: inherit;
        }

        .announcement-actions .btn-share:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .announcement-actions .btn-share i {
            font-size: 0.9rem;
        }

        .announcement-actions .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface-glass);
            color: var(--text-primary);
            text-decoration: none;
            font-family: inherit;
        }

        .announcement-actions .btn-back:hover {
            background: var(--surface-glass-hover);
            box-shadow: var(--shadow);
        }

        /* ===== LOADING / ERROR ===== */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .loading-state i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            display: block;
            color: var(--accent);
        }

        .loading-state .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: #e11d48;
        }

        .error-state i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            display: block;
        }

        .error-state h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .page-shell {
                margin: 20px auto 40px;
                padding: 0 16px;
            }

            .content-card {
                padding: 24px 20px;
            }

            .content-card h1 {
                font-size: 1.6rem;
            }

            .announcement-meta {
                gap: 12px;
                padding: 12px 0;
                flex-direction: column;
            }

            .announcement-body {
                font-size: 0.95rem;
            }

            .announcement-actions {
                flex-direction: column;
            }

            .announcement-actions .btn-share,
            .announcement-actions .btn-back {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .page-shell {
                margin: 12px auto 24px;
                padding: 0 12px;
            }

            .content-card {
                padding: 18px 14px;
                border-radius: 16px;
            }

            .content-card h1 {
                font-size: 1.3rem;
            }

            .announcement-body {
                font-size: 0.9rem;
            }

            .announcement-body ul,
            .announcement-body ol {
                margin-left: 16px;
            }

            .top-banner {
                font-size: 0.8rem;
                padding: 8px 12px;
            }

            .back-link {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP BANNER ===== -->
    <div class="top-banner">
        <i class="fas fa-bullhorn"></i>
        Welcome to Cyber School Experience Community —
        <a href="../chats/">Join your class WhatsApp group</a>
        <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
    </div>

    <!-- ===== HEADER ===== -->
    <div data-include="../../components/header.html"></div>

    <!-- ===== MAIN ===== -->
    <main class="page-shell">
        <div class="content-card" id="announcementContainer">
            <!-- Loading state -->
            <div class="loading-state" id="loadingState">
                <i class="fas fa-spinner spinner"></i>
                <p>Loading announcement...</p>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <div data-include="../../components/footer.html"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="../../assets/js/include.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        (function() {
            'use strict';

            const container = document.getElementById('announcementContainer');
            const loadingState = document.getElementById('loadingState');

            // ===== GET ANNOUNCEMENT ID FROM URL =====
            function getAnnouncementId() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                return id ? parseInt(id) : null;
            }

            function buildAnnouncementUrl(id) {
                const baseUrl = new URL(window.location.href, window.location.origin);
                const basePath = baseUrl.pathname.endsWith('/') ? baseUrl.pathname : baseUrl.pathname.replace(/[^/]+$/, '');
                return new URL(`./single.html?id=${encodeURIComponent(id)}`, `${baseUrl.origin}${basePath}`).toString();
            }

            // ===== FETCH ANNOUNCEMENTS DATA =====
            async function fetchAnnouncements() {
                try {
                    const response = await fetch('../../data/announcements.json');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    const data = await response.json();
                    return data.announcements || [];
                } catch (error) {
                    console.error('Error fetching announcements:', error);
                    return null;
                }
            }

            // ===== RENDER ANNOUNCEMENT =====
            function renderAnnouncement(announcement) {
                if (!announcement) {
                    container.innerHTML = `
                        <div class="error-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>Announcement Not Found</h3>
                            <p>The announcement you're looking for doesn't exist or has been removed.</p>
                            <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--accent);font-weight:600;">
                                ← Back to all announcements
                            </a>
                        </div>
                    `;
                    return;
                }

                const categoryIcons = {
                    'urgent': 'fa-clock',
                    'event': 'fa-calendar-check',
                    'update': 'fa-sync-alt',
                    'important': 'fa-exclamation-triangle'
                };

                const categoryIcon = categoryIcons[announcement.category] || 'fa-bullhorn';

                container.innerHTML = `
                    <a class="back-link" href="index.html">
                        <i class="fas fa-arrow-left"></i> Back to all announcements
                    </a>

                    <span class="eyebrow">
                        <i class="fas ${categoryIcon}"></i> 
                        ${announcement.category ? announcement.category.charAt(0).toUpperCase() + announcement.category.slice(1) : 'Announcement'}
                    </span>

                    <h1>${announcement.title || 'Untitled Announcement'}</h1>

                    <div class="announcement-meta">
                        <span class="meta-item">
                            <span class="author-avatar">${announcement.authorInitial || 'A'}</span>
                            ${announcement.author || 'Unknown'} · ${announcement.authorRole || ''}
                        </span>
                        <span class="meta-item">
                            <i class="fas fa-calendar-alt"></i> ${announcement.date || 'Date not set'}
                        </span>
                        ${announcement.category ? `
                            <span class="meta-item">
                                <span class="category-tag ${announcement.category}">
                                    <i class="fas ${categoryIcon}"></i> ${announcement.category}
                                </span>
                            </span>
                        ` : ''}
                        ${announcement.featured ? `
                            <span class="meta-item">
                                <span class="featured-badge"><i class="fas fa-star"></i> Featured</span>
                            </span>
                        ` : ''}
                    </div>

                    <div class="announcement-body">
                        ${announcement.fullContent || announcement.excerpt || '<p>No content available for this announcement.</p>'}
                    </div>

                    <div class="announcement-actions">
                        <button type="button" id="shareBtn" class="btn-share">
                            <i class="fas fa-share-alt"></i> Share this announcement
                        </button>
                        <a href="index.html" class="btn-back">
                            <i class="fas fa-arrow-left"></i> All Announcements
                        </a>
                    </div>
                `;

                // ===== SHARE BUTTON =====
                const shareBtn = document.getElementById('shareBtn');
                if (shareBtn) {
                    shareBtn.addEventListener('click', function() {
                        const title = announcement.title || 'Cyber School Experience';
                        const url = buildAnnouncementUrl(announcement.id);

                        if (navigator.share) {
                            navigator.share({
                                title: title,
                                text: `📢 ${title}`,
                                url: url
                            }).catch(() => {});
                        } else {
                            const shareText = `📢 ${title}\n${url}`;
                            navigator.clipboard.writeText(shareText).then(() => {
                                showToast('📋 Copied to clipboard!', 'success');
                            }).catch(() => {
                                showToast(`📋 Share: ${title}`, 'info');
                            });
                        }
                    });
                }
            }

            // ===== TOAST NOTIFICATION =====
            function showToast(message, type = 'info') {
                const existingToast = document.querySelector('.toast-notification');
                if (existingToast) existingToast.remove();

                const toast = document.createElement('div');
                toast.className = 'toast-notification';
                toast.style.cssText = `
                    position: fixed;
                    bottom: 24px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 12px 24px;
                    border-radius: 12px;
                    background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                    color: #fff;
                    font-weight: 500;
                    font-size: 0.9rem;
                    box-shadow: 0 8px 24px rgba(0,0,0,0.20);
                    z-index: 9999;
                    opacity: 0;
                    transition: opacity 0.3s ease, transform 0.3s ease;
                    transform: translateX(-50%) translateY(20px);
                    font-family: 'Inter', sans-serif;
                    max-width: 90%;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                });

                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(20px)';
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, 300);
                }, 3000);
            }

            // ===== INIT =====
            async function init() {
                const id = getAnnouncementId();

                if (!id) {
                    container.innerHTML = `
                        <div class="error-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>No Announcement Selected</h3>
                            <p>Please select an announcement from the list.</p>
                            <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--accent);font-weight:600;">
                                ← Back to all announcements
                            </a>
                        </div>
                    `;
                    return;
                }

                const announcements = await fetchAnnouncements();

                if (announcements === null) {
                    container.innerHTML = `
                        <div class="error-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Failed to Load</h3>
                            <p>Could not load announcements. Please try again later.</p>
                            <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--accent);font-weight:600;">
                                ← Back to all announcements
                            </a>
                        </div>
                    `;
                    return;
                }

                const announcement = announcements.find(a => a.id === id);

                if (!announcement) {
                    container.innerHTML = `
                        <div class="error-state">
                            <i class="fas fa-exclamation-circle"></i>
                            <h3>Announcement Not Found</h3>
                            <p>The announcement you're looking for doesn't exist or has been removed.</p>
                            <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--accent);font-weight:600;">
                                ← Back to all announcements
                            </a>
                        </div>
                    `;
                    return;
                }

                renderAnnouncement(announcement);
                console.log('📢 Loaded announcement:', announcement.title);
            }

            // ===== INIT =====
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
