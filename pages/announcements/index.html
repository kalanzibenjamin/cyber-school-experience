<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcements - Cyber School Experience</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="../../assets/css/main.css" />
    
    <style>
        /* ============================================================
           ANNOUNCEMENTS PAGE STYLES
           ============================================================ */
        
        /* ----- PAGE HEADER ----- */
        .page-header {
            padding: 40px 40px 20px;
            position: relative;
            z-index: 5;
        }

        .page-header-content {
            max-width: 1300px;
            margin: 0 auto;
        }

        .page-header-content h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .page-header-content h1 i {
            color: var(--accent);
            font-size: 2rem;
        }

        .page-header-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin-top: 8px;
        }

        /* ----- FILTER SECTION ----- */
        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            padding: 0 0 24px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: 60px;
            padding: 10px 20px;
            transition: all var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.15);
        }

        .search-box i {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text-primary);
        }

        .search-box input::placeholder {
            color: var(--text-light);
        }

        .filter-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btns button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            background: var(--surface-glass);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }

        .filter-btns button:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .filter-btns button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px -4px rgba(42, 125, 225, 0.30);
        }

        .filter-btns button i {
            font-size: 0.8rem;
        }

        /* ----- ANNOUNCEMENTS LIST ----- */
        .announcements-list {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 12px 0;
        }

        .announcement-item {
            display: flex;
            gap: 24px;
            padding: 24px 28px;
            background: var(--surface-glass);
            border-radius: var(--radius);
            border: 1px solid var(--border-glass);
            transition: all var(--transition);
            cursor: pointer;
        }

        .announcement-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            background: var(--surface-glass-hover);
        }

        .announcement-item .status-indicator {
            flex-shrink: 0;
            width: 8px;
            min-height: 100%;
            border-radius: 8px;
            background: var(--accent);
        }

        .announcement-item .status-indicator.urgent {
            background: #e11d48;
        }

        .announcement-item .status-indicator.event {
            background: #f59e0b;
        }

        .announcement-item .status-indicator.update {
            background: #3b82f6;
        }

        .announcement-item .status-indicator.important {
            background: #8b5cf6;
        }

        .announcement-content {
            flex: 1;
        }

        .announcement-content .top-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .announcement-content .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 12px;
            border-radius: 40px;
            background: var(--tag-bg);
            color: var(--accent);
        }

        .announcement-content .category-tag.urgent {
            background: rgba(225, 29, 72, 0.12);
            color: #e11d48;
        }

        .announcement-content .category-tag.event {
            background: rgba(245, 158, 11, 0.12);
            color: #d97706;
        }

        .announcement-content .category-tag.update {
            background: rgba(59, 130, 246, 0.12);
            color: #2563eb;
        }

        .announcement-content .category-tag.important {
            background: rgba(139, 92, 246, 0.12);
            color: #7c3aed;
        }

        .announcement-content .featured-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 12px;
            border-radius: 40px;
            background: #f59e0b;
            color: #fff;
        }

        .announcement-content h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .announcement-content .excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .announcement-content .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .announcement-content .meta .author {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .announcement-content .meta .author .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .announcement-content .meta .date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .announcement-content .meta .share-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 40px;
            transition: all var(--transition);
        }

        .announcement-content .meta .share-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* ----- PAGINATION ----- */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 32px 0 12px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .pagination button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            background: var(--surface-glass);
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .pagination button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ----- EMPTY STATE ----- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--text-light);
            opacity: 0.3;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 1024px) {
            .page-header {
                padding: 30px 24px 16px;
            }

            .page-header-content h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 20px 16px 12px;
            }

            .page-header-content h1 {
                font-size: 1.8rem;
            }

            .page-header-content p {
                font-size: 0.95rem;
            }

            .filter-section {
                flex-direction: column;
                padding: 0 16px 16px;
            }

            .search-box {
                width: 100%;
            }

            .filter-btns {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }

            .filter-btns button {
                flex-shrink: 0;
                font-size: 0.8rem;
                padding: 6px 14px;
            }

            .announcement-item {
                flex-direction: column;
                padding: 18px 16px;
                gap: 12px;
            }

            .announcement-item .status-indicator {
                width: 100%;
                min-height: 4px;
                height: 4px;
            }

            .announcement-content h3 {
                font-size: 1rem;
            }

            .announcement-content .excerpt {
                font-size: 0.85rem;
            }

            .announcement-content .meta {
                font-size: 0.75rem;
                gap: 10px;
            }

            .announcement-content .meta .share-btn {
                margin-left: 0;
                padding: 4px 10px;
            }

            .pagination {
                gap: 4px;
                padding: 20px 0 8px;
            }

            .pagination button {
                min-width: 34px;
                height: 34px;
                font-size: 0.8rem;
                padding: 0 8px;
            }
        }

        @media (max-width: 480px) {
            .page-header-content h1 {
                font-size: 1.4rem;
            }

            .announcement-item {
                padding: 14px 12px;
            }

            .announcement-content .top-row {
                gap: 8px;
            }

            .announcement-content .category-tag {
                font-size: 0.55rem;
                padding: 1px 10px;
            }

            .announcement-content .featured-badge {
                font-size: 0.55rem;
                padding: 1px 10px;
            }
        }
    </style>
</head>
<body>
    
    <!-- ===== TOP BANNER ===== -->
    <div class="top-banner">
        <i class="fas fa-bullhorn"></i>
        Welcome to Cyber School Experience Community —
        <a href="../chats/">Join your class WhatsApp group</a>
        <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>
    </div>

    <!-- ===== HEADER ===== -->
    <div data-include="../../components/header.html"></div>

    <!-- ===== PAGE HEADER ===== -->
    <section class="page-header">
        <div class="page-header-content">
            <span class="badge"><i class="fas fa-bullhorn"></i> Stay Informed</span>
            <h1><i class="fas fa-bullhorn"></i> Announcements</h1>
            <p>Stay updated with the latest news, academic updates, and important information from the Cyber School Experience community</p>
        </div>
    </section>

    <!-- ===== MAIN ===== -->
    <main>

        <!-- ===== FILTER / SEARCH ===== -->
        <div class="filter-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search announcements..." aria-label="Search announcements" />
            </div>
            <div class="filter-btns">
                <button class="active" data-filter="all"><i class="fas fa-list"></i> All</button>
                <button data-filter="urgent"><i class="fas fa-clock"></i> Urgent</button>
                <button data-filter="event"><i class="fas fa-calendar-check"></i> Events</button>
                <button data-filter="update"><i class="fas fa-sync-alt"></i> Updates</button>
                <button data-filter="important"><i class="fas fa-exclamation-triangle"></i> Important</button>
            </div>
        </div>

        <!-- ===== ANNOUNCEMENTS LIST ===== -->
        <div class="announcements-list" id="announcementsList">
            <!-- Cards will be rendered by JS -->
        </div>

        <!-- ===== PAGINATION ===== -->
        <div class="pagination" id="pagination">
            <button id="prevPage" disabled><i class="fas fa-chevron-left"></i></button>
            <button class="active" data-page="1">1</button>
            <button data-page="2">2</button>
            <button data-page="3">3</button>
            <button id="nextPage"><i class="fas fa-chevron-right"></i></button>
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <div data-include="../../components/footer.html"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="../../assets/js/include.js"></script>
    <script src="../../assets/js/main.js"></script>

    <script>
        (function() {
            'use strict';

            // ===== ANNOUNCEMENTS DATA =====
            const ANNOUNCEMENTS_DATA = null;

            function buildAnnouncementDetailUrl(id) {
                const baseUrl = new URL(window.location.href, window.location.origin);
                const basePath = baseUrl.pathname.endsWith('/') ? baseUrl.pathname : baseUrl.pathname.replace(/[^/]+$/, '');
                return new URL(`./single.html?id=${encodeURIComponent(id)}`, `${baseUrl.origin}${basePath}`).toString();
            }

            // ===== ANNOUNCEMENTS MANAGER =====
            class AnnouncementsManager {
                constructor(data) {
                    this.allItems = Array.isArray(data) ? data : (data?.announcements || data?.items || []);
                    this.filteredItems = [...this.allItems];
                    this.currentFilter = 'all';
                    this.searchQuery = '';
                    this.itemsPerPage = 3;
                    this.currentPage = 1;
                }

                getItems() {
                    return this.filteredItems;
                }

                getTotalPages() {
                    return Math.ceil(this.filteredItems.length / this.itemsPerPage);
                }

                getCurrentPage() {
                    return this.currentPage;
                }

                getPageItems(page) {
                    const start = (page - 1) * this.itemsPerPage;
                    const end = start + this.itemsPerPage;
                    return this.filteredItems.slice(start, end);
                }

                filter(category, search = '') {
                    this.currentFilter = category;
                    this.searchQuery = search.toLowerCase().trim();

                    let items = [...this.allItems];

                    // Filter by category
                    if (category !== 'all') {
                        items = items.filter(item => item.category === category);
                    }

                    // Filter by search
                    if (this.searchQuery) {
                        items = items.filter(item => 
                            item.title.toLowerCase().includes(this.searchQuery) ||
                            item.excerpt.toLowerCase().includes(this.searchQuery) ||
                            item.author.toLowerCase().includes(this.searchQuery) ||
                            item.tags.some(tag => tag.toLowerCase().includes(this.searchQuery))
                        );
                    }

                    // Sort by date (newest first)
                    items.sort((a, b) => {
                        const dateA = new Date(a.date);
                        const dateB = new Date(b.date);
                        return dateB - dateA;
                    });

                    this.filteredItems = items;
                    this.currentPage = 1;
                    return this.filteredItems;
                }

                goToPage(page) {
                    const totalPages = this.getTotalPages();
                    if (page < 1 || page > totalPages) return;
                    this.currentPage = page;
                }
            }

            // ===== RENDERER =====
            class AnnouncementsRenderer {
                constructor(containerId) {
                    this.container = document.getElementById(containerId);
                    this.manager = null;
                }

                setManager(manager) {
                    this.manager = manager;
                }

                render(page = 1) {
                    if (!this.manager || !this.container) return;

                    const items = this.manager.getPageItems(page);
                    const totalItems = this.manager.getItems().length;

                    if (totalItems === 0) {
                        this.container.innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <h3>No announcements found</h3>
                                <p>Try adjusting your search or filter criteria</p>
                            </div>
                        `;
                        return;
                    }

                    this.container.innerHTML = items.map(item => {
                        const categoryIcon = {
                            'urgent': 'fa-clock',
                            'event': 'fa-calendar-check',
                            'update': 'fa-sync-alt',
                            'important': 'fa-exclamation-triangle'
                        }[item.category] || 'fa-bullhorn';
                        const detailUrl = buildAnnouncementDetailUrl(item.id);

                        return `
                            <div class="announcement-item" data-id="${item.id}">
                                <div class="status-indicator ${item.category}"></div>
                                <div class="announcement-content">
                                    <div class="top-row">
                                        <span class="category-tag ${item.category}">
                                            <i class="fas ${categoryIcon}"></i>
                                            ${item.category.charAt(0).toUpperCase() + item.category.slice(1)}
                                        </span>
                                        ${item.featured ? '<span class="featured-badge"><i class="fas fa-star"></i> Featured</span>' : ''}
                                    </div>
                                    <h3><a href="${detailUrl}" class="announcement-title-link">${item.title}</a></h3>
                                    <div class="excerpt">${item.fullContent || item.excerpt || ''}</div>
                                    <div class="meta">
                                        <span class="author">
                                            <span class="avatar">${item.authorInitial}</span>
                                            ${item.author} · ${item.authorRole}
                                        </span>
                                        <span class="date">
                                            <i class="fas fa-calendar-alt"></i> ${item.date}
                                        </span>
                                        <div class="announcement-actions">
                                            <a href="${detailUrl}" class="read-more-link">Read more</a>
                                            <button class="share-btn" data-id="${item.id}" data-title="${item.title}" data-url="${detailUrl}" aria-label="Share announcement">
                                                <i class="fas fa-share-alt"></i> Share
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    // Update pagination
                    this.updatePagination();
                }

                updatePagination() {
                    const container = document.getElementById('pagination');
                    if (!container) return;

                    const totalPages = this.manager.getTotalPages();
                    const currentPage = this.manager.getCurrentPage();

                    if (totalPages <= 1) {
                        container.style.display = 'none';
                        return;
                    }
                    container.style.display = 'flex';

                    // Update page buttons
                    const pageBtns = container.querySelectorAll('[data-page]');
                    pageBtns.forEach(btn => {
                        const page = parseInt(btn.dataset.page);
                        btn.classList.toggle('active', page === currentPage);
                        btn.style.display = page <= totalPages ? 'inline-flex' : 'none';
                    });

                    // Update prev/next buttons
                    const prevBtn = document.getElementById('prevPage');
                    const nextBtn = document.getElementById('nextPage');
                    if (prevBtn) prevBtn.disabled = currentPage <= 1;
                    if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
                }
            }

            // ===== INITIALIZE =====
            async function initAnnouncementsPage() {
                try {
                    const announcements = await window.CSE_Announcements.getInstance().load();
                    const manager = new AnnouncementsManager(announcements);
                    manager.filter('all');

                    // Create renderer
                    const renderer = new AnnouncementsRenderer('announcementsList');
                    renderer.setManager(manager);
                    renderer.render(1);

                    // ===== SEARCH =====
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        let searchTimer;
                        searchInput.addEventListener('input', function() {
                            clearTimeout(searchTimer);
                            searchTimer = setTimeout(() => {
                                const query = this.value.trim();
                                manager.filter(manager.currentFilter, query);
                                renderer.render(1);
                            }, 300);
                        });
                    }

                    // ===== FILTERS =====
                    const filterBtns = document.querySelectorAll('.filter-btns button');
                    filterBtns.forEach(btn => {
                        btn.addEventListener('click', function() {
                            filterBtns.forEach(b => b.classList.remove('active'));
                            this.classList.add('active');
                            const filter = this.dataset.filter;
                            const search = searchInput ? searchInput.value.trim() : '';
                            manager.filter(filter, search);
                            renderer.render(1);
                        });
                    });

                    // ===== PAGINATION =====
                    // Page button clicks
                    document.querySelectorAll('#pagination [data-page]').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const page = parseInt(this.dataset.page);
                            if (page <= manager.getTotalPages()) {
                                manager.goToPage(page);
                                renderer.render(page);
                                document.getElementById('announcementsList').scrollIntoView({ 
                                    behavior: 'smooth', 
                                    block: 'start' 
                                });
                            }
                        });
                    });

                    // Prev button
                    const prevBtn = document.getElementById('prevPage');
                    if (prevBtn) {
                        prevBtn.addEventListener('click', function() {
                            const currentPage = manager.getCurrentPage();
                            if (currentPage > 1) {
                                manager.goToPage(currentPage - 1);
                                renderer.render(currentPage - 1);
                                document.getElementById('announcementsList').scrollIntoView({ 
                                    behavior: 'smooth', 
                                    block: 'start' 
                                });
                            }
                        });
                    }

                    // Next button
                    const nextBtn = document.getElementById('nextPage');
                    if (nextBtn) {
                        nextBtn.addEventListener('click', function() {
                            const currentPage = manager.getCurrentPage();
                            const totalPages = manager.getTotalPages();
                            if (currentPage < totalPages) {
                                manager.goToPage(currentPage + 1);
                                renderer.render(currentPage + 1);
                                document.getElementById('announcementsList').scrollIntoView({ 
                                    behavior: 'smooth', 
                                    block: 'start' 
                                });
                            }
                        });
                    }

                    // ===== SHARE BUTTONS =====
                    document.addEventListener('click', function(e) {
                        const shareBtn = e.target.closest('.share-btn');
                        if (shareBtn) {
                            const title = shareBtn.dataset.title || 'Cyber School Experience';
                            const url = shareBtn.dataset.url || buildAnnouncementDetailUrl(shareBtn.dataset.id || '');

                            if (!url) {
                                showToast('⚠️ Unable to build a share link right now.', 'warning');
                                return;
                            }

                            if (navigator.share) {
                                navigator.share({
                                    title: title,
                                    text: `📢 ${title}`,
                                    url: url
                                }).catch(() => {});
                            } else {
                                const shareText = `📢 ${title}\n${url}`;
                                navigator.clipboard.writeText(shareText).then(() => {
                                    showToast('📋 Copied to clipboard!', 'success');
                                }).catch(() => {
                                    showToast(`📋 Share: ${title}`, 'info');
                                });
                            }
                        }
                    });

                    console.log('📢 Announcements page initialized with', manager.allItems.length, 'announcements');
                } catch (error) {
                    console.error('Could not load announcements data:', error);
                    const renderer = new AnnouncementsRenderer('announcementsList');
                    renderer.setManager(new AnnouncementsManager([]));
                    renderer.render(1);
                }
            }

            // ===== TOAST NOTIFICATION =====
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 24px;
                    left: 50%;
                    transform: translateX(-50%);
                    padding: 12px 24px;
                    border-radius: 12px;
                    background: ${type === 'success' ? '#10b981' : '#3b82f6'};
                    color: #fff;
                    font-weight: 500;
                    font-size: 0.9rem;
                    box-shadow: 0 8px 24px rgba(0,0,0,0.20);
                    z-index: 9999;
                    opacity: 0;
                    transition: opacity 0.3s ease, transform 0.3s ease;
                    transform: translateX(-50%) translateY(20px);
                    font-family: 'Inter', sans-serif;
                    max-width: 90%;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                // Trigger fade in
                requestAnimationFrame(() => {
                    toast.style.opacity = '1';
                    toast.style.transform = 'translateX(-50%) translateY(0)';
                });

                // Remove after 3 seconds
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(-50%) translateY(20px)';
                    setTimeout(() => {
                        if (toast.parentNode) toast.remove();
                    }, 300);
                }, 3000);
            }

            // ===== INIT =====
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initAnnouncementsPage);
            } else {
                initAnnouncementsPage();
            }

        })();
    </script>

    
</body>
